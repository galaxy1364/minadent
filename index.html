<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
    :root {
        --main-font: 'IRANSansX', sans-serif;
        --ios-input-bg: #F2F2F7;
        --ios-teal: #008080;
    }

    /* جلوگیری از زوم در کل برنامه */
    input, select, textarea {
        font-size: 18px !important; /* استاندارد طلایی آیفون برای عدم زوم */
        font-family: var(--main-font);
    }

    /* استایل کادرها طبق عکس v9/04 */
    .ios-card-v26 {
        width: 100%;
        background: white;
        border-radius: 28px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 20px;
        box-sizing: border-box;
    }

    /* تیترهای درشت و استاندارد */
    .section-title {
        font-size: 24px;
        font-weight: 900;
        color: #1C1C1E;
        margin-bottom: 15px;
        display: block;
    }

    /* فیلد ورودی کاملاً واقعی (بدون دمو) */
    .real-field {
        width: 100%;
        height: 65px; /* ارتفاع بلند برای راحتی لمس */
        background: var(--ios-input-bg);
        border: 2px solid transparent;
        border-radius: 20px;
        padding: 0 20px;
        color: #000;
        transition: all 0.3s ease;
    }

    .real-field:focus {
        border-color: var(--ios-teal);
        background: #FFF;
    }
</style>

<div class="ios-card-v26">
    <span class="section-title">اطلاعات نوبت</span>
    
    <div style="margin-bottom: 20px;">
        <label style="font-size: 16px; font-weight: bold; color: #8E8E93;">نام بیمار</label>
        <input type="text" class="real-field" placeholder="مثلاً: دکتر مهدی">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="font-size: 16px; font-weight: bold; color: #8E8E93;">خدمت انتخاب شده</label>
        <select class="real-field">
            <option>ایمپلنت (۱۲۰ دقیقه)</option>
            <option>عصب کشی (۶۰ دقیقه)</option>
        </select>
    </div>

    <button style="width: 100%; padding: 22px; border-radius: 22px; background: linear-gradient(135deg, #FF9500, #FF5E3A); color: white; font-size: 20px; font-weight: 900; border: none; box-shadow: 0 12px 25px rgba(255,94,58,0.3);">
        ثبت نهایی در پرونده
    </button>
</div>
