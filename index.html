<div id="bookingPage" style="background: white; position: fixed; inset: 0; z-index: 9000; display: flex; flex-direction: column;">
    
    <div style="padding: 50px 20px 20px; background: #F9F9F9; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EEE;">
        <span style="font-size: 24px; cursor: pointer;" onclick="closeBooking()">✕</span>
        <div style="text-align: right;">
            <div style="font-weight: 900; font-size: 18px;">نوبت‌دهی فول‌اسکرین</div>
            <div style="font-size: 11px; color: var(--teal-master);">استاندارد ۲۰۲۶ • مدیریت نوبت‌ها</div>
        </div>
    </div>

    <div style="padding: 20px; overflow-y: auto; flex: 1;">
        
        <div class="input-block">
            <label>نام و نام خانوادگی بیمار *</label>
            <input type="text" id="pName" placeholder="مثلاً: محمد حسینی" class="v9-input">
        </div>

        <div class="input-block">
            <label>شماره موبایل (جهت پیامک) *</label>
            <input type="tel" id="pCell" placeholder="09120000000" class="v9-input" dir="ltr">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-block">
                <label>تعیین وقت (تاریخ)</label>
                <input type="date" class="v9-input">
            </div>
            <div class="input-block">
                <label>ساعت</label>
                <input type="time" class="v9-input">
            </div>
        </div>

        <div class="input-block">
            <label>توسط کادر:</label>
            <select class="v9-input">
                <option>دکتر مهدی (مدیر)</option>
                <option>دکتر مینا مازندرانی</option>
                <option>اکرم عیدی (منشی)</option>
            </select>
        </div>

        <div style="margin-top: 30px;">
            <button class="v9-submit-btn" onclick="saveBooking()">ثبت نوبت و ارسال پیامک تایید</button>
            <button class="v9-online-btn">فعال‌سازی نوبت‌دهی آنلاین</button>
        </div>
    </div>
</div>

<style>
    .v9-input {
        width: 100%; background: #F2F2F7; border: 2px solid transparent; border-radius: 18px;
        padding: 18px; font-size: 16px; margin-top: 8px; box-sizing: border-box; outline: none;
        transition: 0.3s;
    }
    .v9-input:focus { border-color: var(--teal-master); background: white; }
    .input-block { margin-bottom: 20px; text-align: right; }
    .input-block label { font-weight: bold; font-size: 14px; color: #444; margin-right: 8px; }

    .v9-submit-btn {
        width: 100%; background: linear-gradient(135deg, #FF9500, #FF5E3A);
        color: white; border: none; border-radius: 20px; padding: 20px;
        font-weight: 900; font-size: 18px; box-shadow: 0 10px 25px rgba(255,94,58,0.3);
        cursor: pointer;
    }
    .v9-online-btn {
        width: 100%; background: white; color: var(--teal-master);
        border: 2px solid var(--teal-master); border-radius: 20px; padding: 15px;
        font-weight: bold; margin-top: 15px; cursor: pointer;
    }
</style>
