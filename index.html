<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MinaDent Ultra 2026 - Stable Shield</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #008080; --bg: #ffffff;
            --c1: #E0F7FA; --c2: #F3E5F5; --c3: #FFF3E0; --c4: #E3F2FD;
            --c5: #E8F5E9; --c6: #FFEBEE; --c7: #E0F2F1; --c8: #FCE4EC;
            --c9: #FFFDE7; --c10: #EFEBE9; --c11: #E8EAF6; --c12: #ECEFF1;
        }

        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; touch-action: pan-y; }

        /* استایل لرزش آیکون‌ها در حالت ادیت */
        @keyframes wiggle {
            0% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } 100% { transform: rotate(-1.5deg); }
        }
        .edit-mode .tile, .edit-mode .dock-item { animation: wiggle 0.25s infinite; border: 2px dashed var(--primary); }

        .header { padding: 60px 20px 10px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; padding-bottom: 160px; }

        .tile {
            border-radius: 28px; padding: 25px; text-align: center; background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; transition: transform 0.3s;
        }

        .tile-icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .tile-title { font-size: 14px; font-weight: 900; }

        /* داک اسکرولی پایین */
        .dock-container {
            position: fixed; bottom: 25px; left: 15px; right: 15px; height: 85px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(0,0,0,0.1); z-index: 3000; overflow: hidden;
        }
        .dock-scroll { display: flex; align-items: center; gap: 10px; padding: 0 15px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .dock-scroll::-webkit-scrollbar { display: none; }
        
        .dock-item { flex: 0 0 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .save-btn {
            position: fixed; top: 110px; right: 20px; background: var(--primary); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold;
            display: none; z-index: 4000; box-shadow: 0 5px 15px rgba(0,128,128,0.4);
        }
    </style>
</head>
<body>

    <div id="saveBtn" class="save-btn" onclick="exitEditMode()">✅ ذخیره نهایی چیدمان</div>

    <div class="header">
        <div><small style="color:var(--primary); font-weight:bold;">ULTRA STABLE v12</small><div style="font-size:20px; font-weight:900;">مدیریت ارشد دکتر مهدی</div></div>
        <div style="background:var(--primary); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white;">💎</div>
    </div>

    <div class="main-grid" id="mainGrid">
        <div class="tile" data-id="1" style="background:var(--c1)"><span class="tile-icon">💰</span><div class="tile-title">امور مالی</div></div>
        <div class="tile" data-id="2" style="background:var(--c2)"><span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div></div>
        <div class="tile" data-id="3" style="background:var(--c3)"><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="4" style="background:var(--c4)"><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="5" style="background:var(--c5)"><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div></div>
        <div class="tile" data-id="6" style="background:var(--c6)"><span class="tile-icon">🧠</span><div class="tile-title">هوش‌مصنوعی</div></div>
        <div class="tile" data-id="7" style="background:var(--c7)"><span class="tile-icon">🔩</span><div class="tile-title">ایمپلنت</div></div>
        <div class="tile" data-id="8" style="background:var(--c8)"><span class="tile-icon">🏥</span><div class="tile-title">بیمه‌ها</div></div>
        <div class="tile" data-id="9" style="background:var(--c9)"><span class="tile-icon">🛋️</span><div class="tile-title">یونیت‌ها</div></div>
        <div class="tile" data-id="10" style="background:var(--c10)"><span class="tile-icon">👨‍⚕️</span><div class="tile-title">پرسنل</div></div>
        <div class="tile" data-id="11" style="background:var(--c11)"><span class="tile-icon">📊</span><div class="tile-title">گزارشات</div></div>
        <div class="tile" data-id="12" style="background:var(--c12)"><span class="tile-icon">⚙️</span><div class="tile-title">تنظیمات</div></div>
    </div>

    <div class="dock-container">
        <div class="dock-scroll" id="dockGrid">
            <div class="dock-item" style="background:var(--c1)">💰</div>
            <div class="dock-item" style="background:var(--c2)">🦷</div>
            <div class="dock-item" style="background:var(--c6)">🧠</div>
            <div class="dock-item" style="background:var(--c4)">📅</div>
            <div class="dock-item" style="background:var(--c5)">🧬</div>
        </div>
    </div>

    <script>
        let longPressTimer;
        const grid = document.getElementById('mainGrid');
        const dock = document.getElementById('dockGrid');
        
        // تنظیمات Sortable (فقط وقتی فعال می‌شود که کلاس edit-mode باشد)
        const sortGrid = new Sortable(grid, { animation: 200, disabled: true });
        const sortDock = new Sortable(dock, { animation: 200, disabled: true });

        // تابع تشخیص فشار ۵ ثانیه‌ای
        function startTimer() {
            longPressTimer = setTimeout(() => {
                enterEditMode();
            }, 5000); // دقیقاً ۵ ثانیه
        }

        function clearTimer() { clearTimeout(longPressTimer); }

        document.body.addEventListener('touchstart', startTimer);
        document.body.addEventListener('touchend', clearTimer);
        document.body.addEventListener('touchmove', clearTimer);

        function enterEditMode() {
            document.body.classList.add('edit-mode');
            sortGrid.option("disabled", false);
            sortDock.option("disabled", false);
            document.getElementById('saveBtn').style.display = 'block';
            window.navigator.vibrate(100); // لرزش تایید برای آیفون/اندروید
        }

        function exitEditMode() {
            document.body.classList.remove('edit-mode');
            sortGrid.option("disabled", true);
            sortDock.option("disabled", true);
            document.getElementById('saveBtn').style.display = 'none';
            saveToCore();
        }

        function saveToCore() {
            const gridOrder = Array.from(grid.children).map(t => t.dataset.id);
            localStorage.setItem('mehdi_stable_order_v12', JSON.stringify(gridOrder));
            alert("چیدمان در لایه امنیتی قفل و ذخیره شد.");
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('mehdi_stable_order_v12'));
            if(saved) {
                saved.forEach(id => {
                    const tile = Array.from(grid.children).find(t => t.dataset.id === id);
                    if(tile) grid.appendChild(tile);
                });
            }
        }
    </script>
</body>
</html>
