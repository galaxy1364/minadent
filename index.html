<div class="ultra-booking-system">
    
    <div class="calendar-toolbar">
        <div class="view-switcher">
            <button onclick="switchView('month')">ماه</button>
            <button onclick="switchView('week')">هفته</button>
            <button class="active" onclick="switchView('day')">روز</button>
        </div>
        <div class="current-date-display">۱۵ مهر - دوشنبه</div>
    </div>

    <div class="smart-booking-form">
        <div class="form-row">
            <div class="field-box">
                <label>جستجوی بیمار / پرونده</label>
                <input type="text" id="patientSearch" placeholder="نام یا شماره پرونده..." oninput="checkPatientData()" class="v9-input-style">
                <div id="patientStatus" class="status-badge"></div> </div>
            <div class="field-box">
                <label>توسط کادر (پیش‌فرض)</label>
                <select class="v9-input-style">
                    <option selected>اکرم عیدی (منشی)</option> <option>دکتر مهدی (مدیر)</option>
                    <option>دکتر مینا مازندرانی</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="field-box">
                <label>نوع خدمت (با تایم پیش‌فرض)</label>
                <select id="serviceType" class="v9-input-style" onchange="updateDefaultTime()">
                    <option value="15">ویزیت (۱۵ دقیقه)</option>
                    <option value="60">عصب کشی (۶۰ دقیقه)</option>
                    <option value="90">ایمپلنت (۹۰ دقیقه)</option>
                    <option value="45">ترمیم (۴۵ دقیقه)</option>
                    <option value="60">روکش / تراش (۶۰ دقیقه)</option>
                </select>
            </div>
            <div class="field-box">
                <label>مدت زمان (قابل ادیت دستی)</label>
                <input type="number" id="duration" class="v9-input-style" value="15">
            </div>
        </div>

        <div id="shamsiEngine" class="advanced-calendar-engine">
            </div>

        <button class="v9-save-btn">ثبت نهایی و رزرو یونیت</button>
    </div>
</div>

<style>
    :root {
        --ios-teal: #008080;
        --ios-holiday: #FF3B30;
        --ios-bg-input: #F2F2F7;
    }

    .ultra-booking-system { font-family: 'IRANSansX'; direction: rtl; padding: 15px; }
    
    .calendar-toolbar {
        display: flex; justify-content: space-between; align-items: center;
        background: white; padding: 12px; border-radius: 20px; margin-bottom: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .view-switcher button {
        border: none; background: none; padding: 8px 15px; border-radius: 12px;
        font-size: 13px; font-weight: bold; color: #8E8E93; cursor: pointer;
    }
    .view-switcher button.active { background: var(--ios-teal); color: white; }

    .v9-input-style {
        width: 100%; background: var(--ios-bg-input); border: none;
        border-radius: 15px; padding: 15px; font-size: 15px; outline: none;
        margin-top: 5px;
    }

    .status-badge { font-size: 11px; margin-top: 5px; font-weight: bold; }

    .v9-save-btn {
        width: 100%; background: linear-gradient(135deg, #FF9500, #FF5E3A);
        color: white; border: none; border-radius: 20px; padding: 20px;
        font-weight: 900; font-size: 17px; margin-top: 20px;
        box-shadow: 0 8px 20px rgba(255,94,58,0.3);
    }
</style>

<script>
    function updateDefaultTime() {
        const service = document.getElementById('serviceType');
        const durationInput = document.getElementById('duration');
        durationInput.value = service.value; // تنظیم تایم پیش‌فرض
    }

    function checkPatientData() {
        // شبیه‌ساز اتصال به دیتابیس ۱۰۰ هزار پرونده
        const status = document.getElementById('patientStatus');
        status.innerText = "● بیمار دارای پرونده (آخرین مراجعه: ایمپلنت - ۲ ماه پیش)";
        status.style.color = "var(--ios-teal)";
    }
</script>
