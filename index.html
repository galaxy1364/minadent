<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MinaDent Ultra 2026 - Master Core</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --primary: #008080;
            --c1: #E0F7FA; --c2: #F3E5F5; --c3: #FFF3E0; --c4: #E3F2FD;
            --c5: #E8F5E9; --c6: #FFEBEE; --c7: #E0F2F1; --c8: #FCE4EC;
            --c9: #FFFDE7; --c10: #EFEBE9; --c11: #E8EAF6; --c12: #ECEFF1;
        }

        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; overflow-x: hidden; touch-action: manipulation; }

        .header { padding: 50px 20px 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }

        /* گرید هوشمند با قابلیت جابجایی */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; padding-bottom: 150px; }

        .tile {
            border-radius: 26px; padding: 22px; text-align: center;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            cursor: grab; transition: transform 0.2s; position: relative;
        }
        .tile:active { cursor: grabbing; transform: scale(1.05); z-index: 10; }
        .tile-icon { font-size: 38px; display: block; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .tile-title { font-size: 14px; font-weight: 900; color: #333; }
        .live-tag { position: absolute; top: 12px; right: 12px; font-size: 9px; background: rgba(255,255,255,0.7); padding: 2px 6px; border-radius: 8px; font-weight: bold; }

        /* داک پایین اسکرولی و جابجا شونده */
        .dock-wrapper {
            position: fixed; bottom: 25px; left: 15px; right: 15px; height: 85px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(0,0,0,0.1); z-index: 3000; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        .dock-list { display: flex; align-items: center; gap: 10px; padding: 0 15px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .dock-list::-webkit-scrollbar { display: none; }
        
        .dock-item {
            flex: 0 0 65px; height: 65px; border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .dock-item small { font-size: 8px; font-weight: bold; margin-top: 3px; }

        /* افکت ذخیره سازی */
        .save-indicator {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 8px 20px; border-radius: 20px;
            font-size: 12px; font-weight: bold; display: none; z-index: 4000;
        }
    </style>
</head>
<body onclick="confirmSave()">

    <div id="saveMsg" class="save-indicator">✅ تغییرات ذخیره و قفل شد</div>

    <div class="header">
        <div><small style="color:var(--primary)">System Stable 2026</small><div style="font-size:20px; font-weight:900;">مدیریت متمرکز دکتر مهدی</div></div>
        <div style="background:var(--primary); color:white; width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;">💎</div>
    </div>

    <div class="main-grid" id="masterGrid">
        <div class="tile" data-id="1" style="background:var(--c1)"><span class="live-tag">LIVE</span><span class="tile-icon">💰</span><div class="tile-title">امور مالی</div></div>
        <div class="tile" data-id="2" style="background:var(--c2)"><span class="live-tag">⏳</span><span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div></div>
        <div class="tile" data-id="3" style="background:var(--c3)"><span class="live-tag">📦</span><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="4" style="background:var(--c4)"><span class="live-tag">NEW</span><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="5" style="background:var(--c5)"><span class="live-tag">100K</span><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div></div>
        <div class="tile" data-id="6" style="background:var(--c6)"><span class="live-tag">GPT</span><span class="tile-icon">🧠</span><div class="tile-title">هوش‌مصنوعی</div></div>
        <div class="tile" data-id="7" style="background:var(--c7)"><span class="live-tag">💎</span><span class="tile-icon">🔩</span><div class="tile-title">ایمپلنت</div></div>
        <div class="tile" data-id="8" style="background:var(--c8)"><span class="live-tag">🛡️</span><span class="tile-icon">🏥</span><div class="tile-title">بیمه‌ها</div></div>
        <div class="tile" data-id="9" style="background:var(--c9)"><span class="live-tag">OFF</span><span class="tile-icon">🛋️</span><div class="tile-title">یونیت‌ها</div></div>
        <div class="tile" data-id="10" style="background:var(--c10)"><span class="live-tag">STAFF</span><span class="tile-icon">👩‍⚕️</span><div class="tile-title">پرسنل</div></div>
        <div class="tile" data-id="11" style="background:var(--c11)"><span class="live-tag">REP</span><span class="tile-icon">📊</span><div class="tile-title">گزارشات</div></div>
        <div class="tile" data-id="12" style="background:var(--c12)"><span class="live-tag">SET</span><span class="tile-icon">⚙️</span><div class="tile-title">تنظیمات</div></div>
    </div>

    <div class="dock-wrapper">
        <div class="dock-list" id="masterDock">
            <div class="dock-item" style="background:var(--c1)"><span>💰</span><small>مالی</small></div>
            <div class="dock-item" style="background:var(--c2)"><span>🦷</span><small>لاب</small></div>
            <div class="dock-item" style="background:var(--c6)"><span>🧠</span><small>هوش</small></div>
            <div class="dock-item" style="background:var(--c4)"><span>📅</span><small>نوبت</small></div>
            <div class="dock-item" style="background:var(--c5)"><span>🧬</span><small>پرونده</small></div>
        </div>
    </div>

    <script>
        // فعالسازی قابلیت جابجایی مغناطیسی برای گرید و داک
        new Sortable(document.getElementById('masterGrid'), { animation: 150, ghostClass: 'blue-background-class' });
        new Sortable(document.getElementById('masterDock'), { animation: 150, scroll: true });

        // ذخیره سازی با یک تب (Click) روی صفحه
        function confirmSave() {
            const gridOrder = Array.from(document.querySelectorAll('#masterGrid .tile')).map(t => t.dataset.id);
            localStorage.setItem('minadent_ultra_order', JSON.stringify(gridOrder));
            
            // نمایش افکت ذخیره
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 1500);
        }

        // بازیابی خودکار چیدمان بعد از آپدیت
        window.onload = () => {
            const savedOrder = JSON.parse(localStorage.getItem('minadent_ultra_order'));
            if(savedOrder) {
                const grid = document.getElementById('masterGrid');
                const tiles = Array.from(grid.children);
                savedOrder.forEach(id => {
                    const tile = tiles.find(t => t.dataset.id === id);
                    if(tile) grid.appendChild(tile);
                });
            }
        }
    </script>
</body>
</html>
