<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MinaDent Master v14 | Global Standard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #008080; --bg: #ffffff;
            /* توکن‌های رنگی استاندارد برای تفکیک ۱۲ بخش */
            --c-fin: #E0F7FA; --c-lab: #F3E5F5; --c-inv: #FFF3E0; --c-apt: #E3F2FD;
            --c-pat: #E8F5E9; --c-ai:  #FFEBEE; --c-imp: #E0F2F1; --c-ins: #FCE4EC;
            --c-unt: #FFFDE7; --c-stf: #EFEBE9; --c-rep: #E8EAF6; --c-set: #ECEFF1;
        }

        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; overflow-x: hidden; }

        /* انیمیشن لرزش استاندارد iOS برای حالت ویرایش */
        @keyframes shake {
            0% { transform: rotate(-1deg); } 50% { transform: rotate(1.2deg); } 100% { transform: rotate(-1deg); }
        }
        .edit-mode .tile, .edit-mode .dock-item { animation: shake 0.2s infinite; border: 2.5px solid var(--primary) !important; }

        .header { padding: 60px 25px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(25px); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px 25px 150px; }

        .tile {
            border-radius: 32px; padding: 28px; text-align: center; border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 12px 35px rgba(0,0,0,0.06); position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tile-icon { font-size: 45px; display: block; margin-bottom: 12px; }
        .tile-title { font-size: 15px; font-weight: 900; color: #1c1c1e; }
        .live-indicator { position: absolute; top: 15px; right: 15px; width: 8px; height: 8px; background: #34c759; border-radius: 50%; }

        /* داک پایین با قابلیت اسکرول و جابجایی */
        .dock-container {
            position: fixed; bottom: 30px; left: 20px; right: 20px; height: 90px;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid rgba(0,0,0,0.1); z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden;
        }
        .dock-scroll { display: flex; align-items: center; gap: 15px; padding: 0 20px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .dock-scroll::-webkit-scrollbar { display: none; }
        .dock-item { flex: 0 0 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .save-overlay {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 35px; border-radius: 30px;
            font-size: 14px; font-weight: bold; display: none; z-index: 5000; box-shadow: 0 10px 30px rgba(0,128,128,0.4);
        }
    </style>
</head>
<body>

    <div id="saveBtn" class="save-overlay" onclick="saveAndLock()">✅ تایید و قفل ابدی چیدمان</div>

    <header class="header">
        <div>
            <small style="color:var(--primary); font-weight:900;">PROFESSIONAL CORE v14</small>
            <div style="font-size:22px; font-weight:900;">مدیریت متمرکز دکتر مهدی</div>
        </div>
        <div style="background:var(--primary); width:45px; height:45px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; box-shadow: 0 8px 20px rgba(0,128,128,0.3)">💎</div>
    </header>

    <div class="main-grid" id="mainGrid">
        <div class="tile" data-id="1" style="background:var(--c-fin)"><div class="live-indicator"></div><span class="tile-icon">💰</span><div class="tile-title">امور مالی</div></div>
        <div class="tile" data-id="2" style="background:var(--c-lab)"><span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div></div>
        <div class="tile" data-id="3" style="background:var(--c-inv)"><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="4" style="background:var(--c-apt)"><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="5" style="background:var(--c-pat)"><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div></div>
        <div class="tile" data-id="6" style="background:var(--c-ai)"><span class="tile-icon">🧠</span><div class="tile-title">هوش مصنوعی</div></div>
        <div class="tile" data-id="7" style="background:var(--c-imp)"><span class="tile-icon">🔩</span><div class="tile-title">ایمپلنت</div></div>
        <div class="tile" data-id="8" style="background:var(--c-ins)"><span class="tile-icon">🏥</span><div class="tile-title">بیمه‌ها</div></div>
        <div class="tile" data-id="9" style="background:var(--c-unt)"><span class="tile-icon">🛋️</span><div class="tile-title">یونیت‌ها</div></div>
        <div class="tile" data-id="10" style="background:var(--c-stf)"><span class="tile-icon">👩‍⚕️</span><div class="tile-title">پرسنل</div></div>
        <div class="tile" data-id="11" style="background:var(--c-rep)"><span class="tile-icon">📊</span><div class="tile-title">گزارشات</div></div>
        <div class="tile" data-id="12" style="background:var(--c-set)"><span class="tile-icon">⚙️</span><div class="tile-title">تنظیمات</div></div>
    </div>

    <div class="dock-container">
        <div class="dock-scroll" id="dockGrid">
            <div class="dock-item" data-id="1" style="background:var(--c-fin)">💰</div>
            <div class="dock-item" data-id="2" style="background:var(--c-lab)">🦷</div>
            <div class="dock-item" data-id="6" style="background:var(--c-ai)">🧠</div>
            <div class="dock-item" data-id="4" style="background:var(--c-apt)">📅</div>
            <div class="dock-item" data-id="5" style="background:var(--c-pat)">🧬</div>
        </div>
    </div>

    <script>
        let timer;
        const grid = document.getElementById('mainGrid');
        const dock = document.getElementById('dockGrid');
        
        const sortGrid = new Sortable(grid, { animation: 300, disabled: true });
        const sortDock = new Sortable(dock, { animation: 300, disabled: true });

        // پروتکل حفاظتی ۵ ثانیه‌ای
        function startTimer() { timer = setTimeout(enableEdit, 5000); }
        function cancelTimer() { clearTimeout(timer); }

        document.body.addEventListener('touchstart', startTimer);
        document.body.addEventListener('touchend', cancelTimer);
        document.body.addEventListener('touchmove', cancelTimer);

        function enableEdit() {
            document.body.classList.add('edit-mode');
            sortGrid.option("disabled", false);
            sortDock.option("disabled", false);
            document.getElementById('saveBtn').style.display = 'block';
            if(window.navigator.vibrate) window.navigator.vibrate(200);
        }

        function saveAndLock() {
            document.body.classList.remove('edit-mode');
            sortGrid.option("disabled", true);
            sortDock.option("disabled", true);
            document.getElementById('saveBtn').style.display = 'none';
            
            // ذخیره در لایه دیتابیس لوکال (استاندارد جهانی)
            const order = Array.from(grid.children).map(t => t.dataset.id);
            localStorage.setItem('minadent_stable_v14', JSON.stringify(order));
            alert("تغییرات شما در هسته برنامه قفل شد.");
        }

        // بازیابی خودکار چیدمان شخصی دکتر مهدی
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('minadent_stable_v14'));
            if(saved) {
                saved.forEach(id => {
                    const el = Array.from(grid.children).find(t => t.dataset.id === id);
                    if(el) grid.appendChild(el);
                });
            }
        }
    </script>
</body>
</html>
