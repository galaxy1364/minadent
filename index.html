<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MinaDent Ultra 2026 | Dr. Mehdi</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --teal-2026: #008080; /* کله غازی مدرن */
            --ios-bg: #F2F2F7;
            --card-bg: #ffffff;
            --red-debt: #FF3B30;
            --green-paid: #34C759;
            --orange-pending: #FF9500;
        }

        body { 
            margin: 0; background: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1C1C1E; -webkit-user-select: none;
        }

        /* لوگوی متحرک مشابه دولینگو */
        .main-logo {
            width: 70px; height: 70px; background: var(--teal-2026);
            border-radius: 20px; margin: 50px auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: white;
            box-shadow: 0 10px 25px rgba(0,128,128,0.3);
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* داشبورد و گرید */
        .grid-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
            padding-bottom: 120px;
        }

        .module-card {
            background: var(--card-bg); border-radius: 28px; padding: 25px 15px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; position: relative; border: 1px solid rgba(0,0,0,0.02);
        }

        .icon-box { font-size: 45px; display: block; margin-bottom: 10px; }
        .module-title { font-weight: 900; font-size: 15px; }

        /* بخش نمایش مبالغ هوشمند */
        .finance-badge {
            font-size: 11px; margin-top: 8px; padding: 4px 10px;
            border-radius: 12px; display: inline-block; font-weight: bold;
        }

        /* داک پایین نئومورفیک */
        .bottom-dock {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            height: 85px; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(25px); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 9999;
        }
        
        .dock-btn { font-size: 28px; transition: 0.2s; }
        .center-btn { 
            width: 60px; height: 60px; background: var(--teal-2026); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: white; margin-top: -35px;
            box-shadow: 0 8px 20px rgba(0,128,128,0.4);
        }

        /* حالت ویرایش ۵ ثانیه‌ای */
        .edit-mode { animation: wiggle 0.3s infinite; border: 2px solid var(--teal-2026) !important; }
        @keyframes wiggle { 0% {transform:rotate(-1deg)} 50% {transform:rotate(1deg)} 100% {transform:rotate(-1deg)} }
    </style>
</head>
<body>

    <div class="main-logo">💎</div>

    <div class="grid-container" id="appGrid">
        <div class="module-card" data-id="finance" style="border-right: 5px solid var(--teal-2026);">
            <span class="icon-box">💰</span>
            <div class="module-title">حسابداری مالی</div>
            <div class="finance-badge" style="background: #FFE5E5; color: var(--red-debt);">بدهی: ۱۲,۴۰۰,۰۰۰</div>
        </div>

        <div class="module-card" data-id="implant" style="border-right: 5px solid #607D8B;">
            <span class="icon-box">🔩</span>
            <div class="module-title">پنل ایمپلنت</div>
            <div class="finance-badge" style="background: #E8F5E9; color: var(--green-paid);">جراحی‌های امروز: ۳</div>
        </div>

        <div class="module-card" data-id="patients">
            <span class="icon-box">🧬</span>
            <div class="module-title">پرونده ۳‌بعدی</div>
            <div class="finance-badge" style="background: #E3F2FD; color: #1976D2;">۱۰۰,۰۰۰ رکورد</div>
        </div>

        <div class="module-card" data-id="ai">
            <span class="icon-box">🧠</span>
            <div class="module-title">هوش صوتی</div>
            <div class="finance-badge" style="background: #F3E5F5; color: #7B1FA2;">آماده نوبت‌دهی</div>
        </div>
    </div>

    <div class="bottom-dock">
        <div class="dock-btn">🏠</div>
        <div class="dock-btn">📅</div>
        <div class="center-btn">🎙️</div>
        <div class="dock-btn">📦</div>
        <div class="dock-btn">⚙️</div>
    </div>

    <script>
        const grid = document.getElementById('appGrid');
        let sortable = new Sortable(grid, {
            animation: 350,
            disabled: true,
            onEnd: () => {
                const order = sortable.toArray();
                localStorage.setItem('mehdi_order_2026', JSON.stringify(order));
            }
        });

        let pressTimer;
        document.body.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                sortable.option("disabled", false);
                document.querySelectorAll('.module-card').forEach(el => el.classList.add('edit-mode'));
                if(window.navigator.vibrate) window.navigator.vibrate(200);
            }, 5000);
        });

        document.body.addEventListener('touchend', () => clearTimeout(pressTimer));

        // بستن حالت ویرایش با تپ روی پس‌زمینه
        document.body.addEventListener('click', (e) => {
            if (e.target.tagName === 'BODY') {
                sortable.option("disabled", true);
                document.querySelectorAll('.module-card').forEach(el => el.classList.remove('edit-mode'));
            }
        });
    </script>
</body>
</html>
