<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MinaDent Ultra 2026 | Dr. Mehdi Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --teal-master: #008080; /* رنگ کله‌غازی اختصاصی */
            --gold-accent: #D4AF37;
            --bg-ios: #F2F2F7;
            --danger: #FF3B30; /* قرمز برای بدهکار */
            --success: #34C759; /* سبز برای پرداختی */
            --warning: #FF9500; /* نارنجی برای موعد نرسیده */
        }

        body { 
            margin: 0; background: var(--bg-ios); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; -webkit-user-select: none;
        }

        /* لوگو متحرک مشابه دولینگو */
        .app-logo {
            width: 80px; height: 80px; background: var(--teal-master);
            border-radius: 20px; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,128,128,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* گرید هوشمند ۱۲ بخش */
        .main-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
            padding-bottom: 120px;
        }

        .tile {
            background: white; border-radius: 25px; padding: 20px;
            text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: relative; transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .tile img { width: 50px; height: 50px; margin-bottom: 10px; }
        .tile-title { font-weight: 900; font-size: 14px; color: #1C1C1E; }

        /* داک پایین نئومورفیسم */
        .dock {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            height: 80px; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5);
        }

        /* استایل مبالغ */
        .amount-red { color: var(--danger); font-weight: bold; }
        .amount-green { color: var(--success); font-weight: bold; }
        .amount-orange { color: var(--warning); font-weight: bold; }

    </style>
</head>
<body>

    <div class="app-logo">💎</div>

    <div class="main-grid" id="masterGrid">
        <div class="tile animate__animated animate__fadeIn" data-id="finance">
            <span style="font-size: 40px;">💰</span>
            <div class="tile-title">حسابداری پیشرفته</div>
            <div style="font-size: 10px; margin-top: 5px;" class="amount-red">مانده: ۱۲,۵۰۰,۰۰۰</div>
        </div>

        <div class="tile animate__animated animate__fadeIn" data-id="implant">
            <span style="font-size: 40px;">🔩</span>
            <div class="tile-title">ایمپلنتولوژی</div>
            <div style="font-size: 10px; margin-top: 5px;">مدیریت برندها</div>
        </div>

        </div>

    <nav class="dock">
        <div onclick="location.reload()">🏠</div>
        <div>📅</div>
        <div style="font-size: 30px; background: var(--teal-master); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 10px 20px rgba(0,128,128,0.4);">🎙️</div>
        <div>🧬</div>
        <div>⚙️</div>
    </nav>

    <script>
        // قفل ۵ ثانیه‌ای جابجایی (استاندارد جهانی)
        const grid = document.getElementById('masterGrid');
        let sortable = new Sortable(grid, {
            animation: 350,
            disabled: true,
            ghostClass: 'sortable-ghost'
        });

        let timer;
        document.body.addEventListener('touchstart', () => {
            timer = setTimeout(() => {
                sortable.option("disabled", false);
                document.body.style.backgroundColor = "#e5e5ea";
                if(window.navigator.vibrate) window.navigator.vibrate(200);
            }, 5000);
        });

        document.body.addEventListener('touchend', () => {
            clearTimeout(timer);
        });

        // ذخیره خودکار وضعیت در حافظه دائم
        function saveToCore() {
            const order = sortable.toArray();
            localStorage.setItem('mehdi_stable_v2026', JSON.stringify(order));
        }
    </script>
</body>
</html>
