<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MinaDent Ultra v1.1 | Visual Hardening</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            /* پالت رنگی استخراج شده از عکس‌ها */
            --teal-master: #008080; /* کله غازی اصلی */
            --green-active: #8BC34A; /* سبز فسفری */
            --red-action: #FF3B30; /* قرمز ثبت دریافت */
            --ios-bg: #F2F2F7;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            margin: 0; background: var(--ios-bg); font-family: var(--font-main);
            color: #1C1C1E; direction: rtl; -webkit-user-select: none;
        }

        /* لوگو متحرک ۳ بعدی (طبق Duolingo و عکس‌ها) */
        .app-logo {
            width: 75px; height: 75px; background: var(--teal-master);
            border-radius: 20px; margin: 40px auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: white;
            box-shadow: 0 10px 20px rgba(0,128,128,0.3);
            animation: bounceIn 1.5s ease-in-out infinite;
        }
        @keyframes bounceIn { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-5px) scale(1.03); } }

        /* گرید هوشمند ۱۲ بخش */
        .main-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
            padding-bottom: 120px;
        }

        .tile {
            background: white; border-radius: 28px; padding: 25px 15px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
        }

        /* آیکون ۳ بعدی ۳ بعدی (طبق عکس‌ها) */
        .tile-icon { 
            font-size: 42px; display: block; margin-bottom: 12px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }
        
        .tile-title { font-weight: 900; font-size: 14px; color: #333; }

        /* نشانگر وضعیت مالی هوشمند */
        .status-pill {
            font-size: 10px; margin-top: 10px; padding: 4px 10px;
            border-radius: 12px; display: inline-block; font-weight: bold;
        }

        /* داک پایین نئومورفیک ۳D (طبق عکس‌ها) */
        .bottom-dock {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            height: 85px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(25px); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.4); z-index: 2000;
        }

        .center-mic-btn {
            width: 60px; height: 60px; background: var(--teal-master);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; margin-top: -35px;
            box-shadow: 0 10px 20px rgba(0,128,128,0.3); animation: micPulse 2s infinite;
        }
        @keyframes micPulse { 0% { box-shadow: 0 0 0 0px rgba(0,128,128,0.4); } 70% { box-shadow: 0 0 0 10px rgba(0,128,128,0); } 100% { box-shadow: 0 0 0 0px rgba(0,128,128,0); } }

        /* انیمیشن لرزش ۵ ثانیه‌ای */
        .edit-active { animation: wiggle 0.3s infinite; border: 2.5px solid var(--teal-master) !important; }
        @keyframes wiggle { 0% {transform: rotate(-1deg)} 50% {transform: rotate(1deg)} 100% {transform: rotate(-1deg)} }
    </style>
</head>
<body>

    <div class="app-logo">💎</div>

    <div class="main-grid" id="masterGrid">
        <div class="tile" data-id="fin" style="border-right: 5px solid var(--red-action)">
            <span class="tile-icon">💰</span><div class="tile-title">امور مالی</div>
            <div class="status-pill" style="background:#FFE5E5; color:var(--red-action)">بدهی: قرمز</div>
        </div>
        <div class="tile" data-id="lab" style="border-right: 5px solid var(--green-active)">
            <span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div>
            <div class="status-pill" style="background:#E8F5E9; color:var(--green-active);">تسویه: سبز</div>
        </div>
        <div class="tile" data-id="inv"><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="pat"><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div><div class="status-pill" style="background:#E3F2FD; color:#007AFF;">۱۰۰,۰۰۰</div></div>
        <div class="tile" data-id="apt"><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="ai"><span class="tile-icon">🧠</span><div class="tile-title">هوش مصنوعی</div></div>
    </div>

    <nav class="bottom-dock">
        <div style="font-size:28px;">🏠</div>
        <div style="font-size:28px;">📅</div>
        <div class="center-mic-btn">🎙️</div>
        <div style="font-size:28px;">🧬</div>
        <div style="font-size:28px;">⚙️</div>
    </nav>

    <script>
        const grid = document.getElementById('masterGrid');
        let sortable = new Sortable(grid, { animation: 350, disabled: true });
        let timer;
        document.body.addEventListener('touchstart', () => {
            timer = setTimeout(() => {
                sortable.option("disabled", false);
                document.querySelectorAll('.tile').forEach(t => t.classList.add('edit-active'));
                if(window.navigator.vibrate) window.navigator.vibrate(150);
            }, 5000);
        });
        document.body.addEventListener('touchend', () => clearTimeout(timer));
        document.body.addEventListener('click', (e) => {
            if (e.target.tagName === 'BODY') {
                sortable.option("disabled", true);
                document.querySelectorAll('.tile').forEach(t => t.classList.remove('edit-active'));
            }
        });
    </script>
</body>
</html>
