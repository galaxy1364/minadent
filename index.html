<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MinaDent Master v15 | Isolated Core</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #008080; --bg: #ffffff;
            --c-fin: #E0F7FA; --c-lab: #F3E5F5; --c-inv: #FFF3E0; --c-apt: #E3F2FD;
            --c-pat: #E8F5E9; --c-ai:  #FFEBEE; --c-imp: #E0F2F1; --c-ins: #FCE4EC;
            --c-unt: #FFFDE7; --c-stf: #EFEBE9; --c-rep: #E8EAF6; --c-set: #ECEFF1;
        }

        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; -webkit-user-select: none; }

        /* حالت لرزش آیفون ۲۰۲۶ */
        @keyframes wiggle {
            0% { transform: rotate(-1.2deg); } 50% { transform: rotate(1.2deg); } 100% { transform: rotate(-1.2deg); }
        }
        .edit-active .tile, .edit-active .dock-item { animation: wiggle 0.2s infinite; border: 2px solid var(--primary) !important; filter: brightness(0.9); }

        .header { padding: 60px 25px 15px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 20px 20px 160px; }

        .tile {
            border-radius: 30px; padding: 25px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tile-icon { font-size: 42px; display: block; margin-bottom: 10px; }
        .tile-title { font-size: 14px; font-weight: 900; }

        /* داک پایین هوشمند */
        .dock-container {
            position: fixed; bottom: 25px; left: 15px; right: 15px; height: 85px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(0,0,0,0.1); z-index: 3000; overflow: hidden;
        }
        .dock-scroll { display: flex; align-items: center; gap: 12px; padding: 0 15px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .dock-scroll::-webkit-scrollbar { display: none; }
        .dock-item { flex: 0 0 62px; height: 62px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .lock-notify {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; color: white; padding: 10px 25px; border-radius: 20px;
            font-size: 13px; font-weight: bold; display: none; z-index: 5000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="saveMsg" class="lock-notify">🔒 وضعیت و چیدمان در هسته قفل شد</div>

    <header class="header">
        <div>
            <small style="color:var(--primary); font-weight:900;">IMMUTABLE CORE v15</small>
            <div style="font-size:20px; font-weight:900;">پنل دکتر مهدی | MinaDent Ultra</div>
        </div>
        <div style="background:var(--primary); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white;">💎</div>
    </header>

    <div class="main-grid" id="mainGrid">
        <div class="tile" data-id="1" style="background:var(--c-fin)"><span class="tile-icon">💰</span><div class="tile-title">امور مالی</div></div>
        <div class="tile" data-id="2" style="background:var(--c-lab)"><span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div></div>
        <div class="tile" data-id="3" style="background:var(--c-inv)"><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="4" style="background:var(--c-apt)"><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="5" style="background:var(--c-pat)"><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div></div>
        <div class="tile" data-id="6" style="background:var(--c-ai)"><span class="tile-icon">🧠</span><div class="tile-title">هوش‌مصنوعی</div></div>
        <div class="tile" data-id="7" style="background:var(--c-imp)"><span class="tile-icon">🔩</span><div class="tile-title">ایمپلنت</div></div>
        <div class="tile" data-id="8" style="background:var(--c-ins)"><span class="tile-icon">🏥</span><div class="tile-title">بیمه‌ها</div></div>
        <div class="tile" data-id="9" style="background:var(--c-unt)"><span class="tile-icon">🛋️</span><div class="tile-title">یونیت‌ها</div></div>
        <div class="tile" data-id="10" style="background:var(--c-stf)"><span class="tile-icon">👨‍⚕️</span><div class="tile-title">پرسنل</div></div>
        <div class="tile" data-id="11" style="background:var(--c-rep)"><span class="tile-icon">📊</span><div class="tile-title">گزارشات</div></div>
        <div class="tile" data-id="12" style="background:var(--c-set)"><span class="tile-icon">⚙️</span><div class="tile-title">تنظیمات</div></div>
    </div>

    <div class="dock-container">
        <div class="dock-scroll" id="dockGrid">
            <div class="dock-item" data-id="1" style="background:var(--c-fin)">💰</div>
            <div class="dock-item" data-id="2" style="background:var(--c-lab)">🦷</div>
            <div class="dock-item" data-id="6" style="background:var(--c-ai)">🧠</div>
            <div class="dock-item" data-id="4" style="background:var(--c-apt)">📅</div>
            <div class="dock-item" data-id="5" style="background:var(--c-pat)">🧬</div>
        </div>
    </div>

    <script>
        let pressTimer;
        const grid = document.getElementById('mainGrid');
        const dock = document.getElementById('dockGrid');
        
        const sortGrid = new Sortable(grid, { animation: 300, disabled: true });
        const sortDock = new Sortable(dock, { animation: 300, disabled: true });

        // سنسور فشار ۵ ثانیه استاندارد
        function startPress() { pressTimer = setTimeout(activateEdit, 5000); }
        function endPress() { clearTimeout(pressTimer); }

        document.body.addEventListener('touchstart', startPress);
        document.body.addEventListener('touchend', endPress);
        document.body.addEventListener('touchmove', endPress);

        function activateEdit() {
            document.body.classList.add('edit-active');
            sortGrid.option("disabled", false);
            sortDock.option("disabled", false);
            if(window.navigator.vibrate) window.navigator.vibrate(150);
        }

        // ذخیره ابدی با یک ضربه روی فضای خالی
        document.body.addEventListener('click', (e) => {
            if (document.body.classList.contains('edit-active') && e.target.tagName === 'BODY') {
                saveFinalState();
            }
        });

        function saveFinalState() {
            document.body.classList.remove('edit-active');
            sortGrid.option("disabled", true);
            sortDock.option("disabled", true);
            
            const state = Array.from(grid.children).map(t => t.dataset.id);
            localStorage.setItem('mehdi_core_v15', JSON.stringify(state));
            
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        }

        // لودینگ ایمن چیدمان
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('mehdi_core_v15'));
            if(saved) {
                saved.forEach(id => {
                    const el = Array.from(grid.children).find(t => t.dataset.id === id);
                    if(el) grid.appendChild(el);
                });
            }
        }
    </script>
</body>
</html>
