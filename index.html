<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MinaDent Ultra 2026 | Enterprise Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            /* پالت رنگی استاندارد ۲۰۲۶ (Global Medical UI) */
            --primary: #008080; --accent: #ffd700; --white: #ffffff;
            --bg-page: #f2f2f7; --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-standard: 0 10px 30px rgba(0,0,0,0.08);
            
            /* تم‌های رنگی ۱۲ بخش (قفل شده) */
            --c-finance: #e0f7fa; --c-lab: #f3e5f5; --c-inventory: #fff3e0;
            --c-apt: #e3f2fd; --c-patient: #e8f5e9; --c-ai: #ffebee;
            --c-implant: #e0f2f1; --c-insurance: #fce4ec; --c-unit: #fffde7;
            --c-staff: #efebe9; --c-reports: #e8eaf6; --c-settings: #eceff1;
        }

        body { margin: 0; background: var(--bg-page); font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; }

        /* لایه حفاظتی: لرزش فقط در حالت ادیت */
        @keyframes wiggle {
            0% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); }
        }
        .edit-mode .tile, .edit-mode .dock-item { animation: wiggle 0.25s infinite; border: 2.5px solid var(--primary) !important; }

        /* هدر فوق حرفه‌ای */
        .header {
            padding: 60px 25px 20px; background: var(--glass-bg); backdrop-filter: blur(30px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; color: #1c1c1e; }
        .header small { color: var(--primary); font-weight: 800; display: block; }

        /* گرید ماژولار (Global Standard) */
        .main-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px;
            padding-bottom: 160px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile {
            border-radius: 35px; padding: 30px 20px; text-align: center;
            background: var(--white); box-shadow: var(--shadow-standard);
            position: relative; transition: transform 0.4s; border: 1px solid rgba(0,0,0,0.01);
        }
        .tile-icon { font-size: 48px; display: block; margin-bottom: 15px; }
        .tile-title { font-size: 15px; font-weight: 900; color: #2c3e50; }

        /* داک پایین هوشمند (Dock Core) */
        .dock-container {
            position: fixed; bottom: 30px; left: 20px; right: 20px; height: 95px;
            background: var(--glass-bg); backdrop-filter: blur(35px);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.5);
            z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
        }
        .dock-scroll { display: flex; align-items: center; gap: 15px; padding: 0 20px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .dock-scroll::-webkit-scrollbar { display: none; }
        .dock-item { flex: 0 0 70px; height: 70px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        /* وضعیت ذخیره‌سازی */
        .status-toast {
            position: fixed; top: 125px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; color: #fff; padding: 12px 30px; border-radius: 30px;
            font-size: 13px; font-weight: bold; display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="toast" class="status-toast">🔒 چیدمان در هسته پایدار قفل شد</div>

    <header class="header">
        <div>
            <small>ENTERPRISE v16</small>
            <h1>مدیریت ارشد دکتر مهدی</h1>
        </div>
        <div style="background:var(--primary); width:48px; height:48px; border-radius:18px; display:flex; align-items:center; justify-content:center; color:white; font-size:22px; box-shadow:0 8px 25px rgba(0,128,128,0.3)">💎</div>
    </header>

    <div class="main-grid" id="globalGrid">
        <div class="tile" data-id="fin" style="background:var(--c-finance)"><span class="tile-icon">💰</span><div class="tile-title">امور مالی</div></div>
        <div class="tile" data-id="lab" style="background:var(--c-lab)"><span class="tile-icon">🦷</span><div class="tile-title">لابراتوار</div></div>
        <div class="tile" data-id="inv" style="background:var(--c-inventory)"><span class="tile-icon">📦</span><div class="tile-title">انبارگردانی</div></div>
        <div class="tile" data-id="apt" style="background:var(--c-apt)"><span class="tile-icon">📅</span><div class="tile-title">نوبت‌دهی</div></div>
        <div class="tile" data-id="pat" style="background:var(--c-patient)"><span class="tile-icon">🧬</span><div class="tile-title">بیماران</div></div>
        <div class="tile" data-id="ai" style="background:var(--c-ai)"><span class="tile-icon">🧠</span><div class="tile-title">هوش‌مصنوعی</div></div>
        <div class="tile" data-id="imp" style="background:var(--c-implant)"><span class="tile-icon">🔩</span><div class="tile-title">ایمپلنت</div></div>
        <div class="tile" data-id="ins" style="background:var(--c-insurance)"><span class="tile-icon">🏥</span><div class="tile-title">بیمه‌ها</div></div>
        <div class="tile" data-id="unt" style="background:var(--c-unit)"><span class="tile-icon">🛋️</span><div class="tile-title">یونیت‌ها</div></div>
        <div class="tile" data-id="stf" style="background:var(--c-staff)"><span class="tile-icon">👨‍⚕️</span><div class="tile-title">پرسنل</div></div>
        <div class="tile" data-id="rep" style="background:var(--c-reports)"><span class="tile-icon">📊</span><div class="tile-title">گزارشات</div></div>
        <div class="tile" data-id="set" style="background:var(--c-settings)"><span class="tile-icon">⚙️</span><div class="tile-title">تنظیمات</div></div>
    </div>

    <div class="dock-container">
        <div class="dock-scroll" id="globalDock">
            <div class="dock-item" style="background:var(--c-finance)">💰</div>
            <div class="dock-item" style="background:var(--c-lab)">🦷</div>
            <div class="dock-item" style="background:var(--c-ai)">🧠</div>
            <div class="dock-item" style="background:var(--c-apt)">📅</div>
            <div class="dock-item" style="background:var(--c-patient)">🧬</div>
        </div>
    </div>

    <script>
        let longPressTimer;
        const grid = document.getElementById('globalGrid');
        const dock = document.getElementById('globalDock');

        // موتور جابجایی استاندارد جهانی
        const sortGrid = new Sortable(grid, { animation: 350, disabled: true });
        const sortDock = new Sortable(dock, { animation: 350, disabled: true });

        // سنسور فشار ۵ ثانیه با استاندارد دقیق
        document.body.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => enterEditMode(), 5000);
        });

        document.body.addEventListener('touchend', () => clearTimeout(longPressTimer));
        document.body.addEventListener('touchmove', () => clearTimeout(longPressTimer));

        function enterEditMode() {
            document.body.classList.add('edit-mode');
            sortGrid.option("disabled", false);
            sortDock.option("disabled", false);
            if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
        }

        // خروج و ذخیره ابدی با یک تپ روی پس‌زمینه
        document.body.addEventListener('click', (e) => {
            if (document.body.classList.contains('edit-mode') && e.target.tagName === 'BODY') {
                exitAndLock();
            }
        });

        function exitAndLock() {
            document.body.classList.remove('edit-mode');
            sortGrid.option("disabled", true);
            sortDock.option("disabled", true);
            
            // پروتکل ذخیره ابدی
            const order = Array.from(grid.children).map(t => t.dataset.id);
            localStorage.setItem('mehdi_ultra_stable_v16', JSON.stringify(order));
            
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // بازخوانی از حافظه دائمی
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('mehdi_ultra_stable_v16'));
            if(saved) {
                saved.forEach(id => {
                    const el = Array.from(grid.children).find(t => t.dataset.id === id);
                    if(el) grid.appendChild(el);
                });
            }
        };
    </script>
</body>
</html>
